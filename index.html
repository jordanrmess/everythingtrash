<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>cup</title>

    <script
      type="module"
      src="https://unpkg.com/playhtml/dist/init.es.js"
    ></script>

    <script>
      window.addEventListener("DOMContentLoaded", () => {
        const cup = document.getElementById("cup");

        cup.defaultData = { count: 1 };

        cup.onClick = (e, { data, setData }) => {
          if (e.shiftKey) {
            setData({ count: 1 });
            return;
          }

          setData({
            count: Math.min((data?.count ?? 1) + 1, 5),
          });
        };

        cup.updateElement = ({ element, data }) => {
          const count = data?.count ?? 1;
          element.src = `./cups/${count}.png`;
        };
      });
    </script>

    <style>
      #cup {
        width: 80px;
        height: auto;
      }
    </style>
  </head>

  <body>
    <h1 can-move><i>everything is trash</i></h1>
      <img
        can-play
        id="cup"
        src="./cups/1.png"

    </div>
  </body>
</html>
