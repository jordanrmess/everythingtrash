<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rock+3D&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>

  <body>
    <div class="header-row">
      <h1 id="title">everything is trash</h1>
      <div class="controls">
        <select id="item-type">
          <option value="cans">Can</option>
          <option value="cups">Cup</option>
          <option value="lamps">Lamp</option>
        </select>
        <button id="add-item" type="button">Add Item</button>
      </div>
    </div>
    <div id="trash-items">
      <img
      id="cup-1"
      class="trash"
        src="./cups/1.svg"
        data-type="cups"
        data-count="1"
        can-move
      />
      <img
      id="can-1"
        class="trash"
        src="./cans/1.svg"
        data-type="cans"
        data-count="1"
        can-move
      />
       <img
      id="lamp-1"
        class="trash"
        src="./lamps/1.svg"
        data-type="lamps"
        data-count="1"
        can-move
      />
    </div>
    <script type="module" src="./js/main.js"></script>
    <script type="module">
      import { playhtml } from "https://unpkg.com/playhtml";
      playhtml.init();
    </script>
  </body>
</html>
