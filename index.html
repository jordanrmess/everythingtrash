<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rock+3D&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>

  <body>
    <div class="header-row">
      <h1 id="title" can-move>
        <span class="letter" can-move>e</span>
        <span class="letter" can-move>v</span>
        <span class="letter" can-move>e</span>
        <span class="letter" can-move>r</span>
        <span class="letter" can-move>y</span>
        <span class="letter" can-move>t</span>
        <span class="letter" can-move>h</span>
        <span class="letter" can-move>i</span>
        <span class="letter" can-move>n</span>
        <span class="letter" can-move>g</span>
        <span class="spc" can-move> </span>
        <span class="letter" can-move>i</span>
        <span class="letter" can-move>s</span>
        <span class="spc" can-move> </span>
        <span class="letter" can-move>t</span>
        <span class="letter" can-move>r</span>
        <span class="letter" can-move>a</span>
        <span class="letter" can-move>s</span>
        <span class="letter" can-move>h</span>
      </h1>
      <div class="controls">
        <select id="item-type">
          <option value="cans">Can</option>
          <option value="cups">Cup</option>
          <option value="lamps">Lamp</option>
          <option value="glasses">Glasses</option>
        </select>
        <button id="add-item" type="button">Add Item</button>
      </div>
    </div>
    <div id="trash-items">
      <img
      id="cup-1"
      class="trash"
      src="./cups/1.svg"
      data-type="cups"
      data-count="1"
      can-move
      draggable="false"
    />
      <img
      id="can-1"
      class="trash"
      src="./cans/1.svg"
      data-type="cans"
      data-count="1"
      can-move
      draggable="false"
    />
       <img
      id="lamp-1"
      class="trash"
      src="./lamps/1.svg"
      data-type="lamps"
      data-count="1"
      can-move
      draggable="false"
    />
      <img
      id="glasses-1"
      class="trash"
      src="./glasses/1.svg"
      data-type="glasses"
      data-count="1"
      can-move
      draggable="false"
    />
    </div>
    <script type="module" src="./js/main.js"></script>
    <script type="module">
      import { playhtml } from "https://unpkg.com/playhtml";
      playhtml.init();
    </script>
  </body>
</html>
