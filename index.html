  <body>
    <h1 can-move><i>everything is trash</i></h1>
    <img id="cup" src="./cups/1.png" can-move />
    <script type="module">
      const cup = document.getElementById("cup");
      let count = 1;
      cup.onclick = (e) => {
        if (e.shiftKey) {
          count = 1;
        } else {
          count = Math.min(count + 1, 5);
        }
        cup.src = `./cups/${count}.png`;
      };
    </script>
